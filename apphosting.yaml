# Firebase App Hosting configuration for TWG Web
# https://firebase.google.com/docs/app-hosting/configure
#
# App root: apps/web (monorepo — Next.js lives here)
# Project: twg-dev
# Region: us-central1

runConfig:
  cpu: 1
  memoryMiB: 512
  concurrency: 80

env:
  # ── Monorepo: tell the buildpack where the Next.js app lives ──
  - variable: GOOGLE_BUILDABLE
    value: apps/web

  # ── Client-side Firebase config (non-secret, baked into JS bundle) ──
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyBKjQsTYc4F60HV1yYHkPpQ1Cukpgh2u_U
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: twg-dev.firebaseapp.com
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: twg-dev
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: twg-dev.firebasestorage.app
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "192374801010"
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:192374801010:web:8d4ec4e4cd168ed95b78eb
  - variable: NEXT_PUBLIC_APP_ENV
    value: development
